<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User login</title>
    <style>
                body{
            background-color: rgb(11, 25, 41);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;

        }
        .topcontent{
            margin-top: 3rem;
            color: white;
            /* border: 1px solid red; */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:0rem;

        }
            .main{
            font-size: 2rem;
            font-weight: bold;
        }
          .btn{
            text-decoration: none;
            padding: 0.5rem;
            background-color: rgb(141, 205, 235);
            border-radius: 5px;
            margin-top: 2rem;
            text-align: center;
        }
        .loginform{
            border: 1px solid rgb(146, 132, 132);
            border-radius: 5px;
            width: 25%;
            
        }
        form{
            display: flex;
            flex-direction: column;
            padding: 1rem 2rem;
        }
        form input{
            width: 100%;
            margin-top: 0.5rem;
            height: 4vh;
            border-radius: 5px;
            background-color: transparent;
            border:0.1px solid white;
        }
        form label{
            margin-top: 2rem;
            color: wheat;
           
        }
        .signup{
            margin-top: 1rem;
            color:aqua;
            /* margin-bottom: ; */
        }
        .signup a{
            color: white;
            text-decoration:none;
        }
    </style>
</head>
<body>
        <div class="topcontent">
        <span class="main">USer Login</span>
        <span>User Login Form</span>
    </div>


    <div class="loginform">
        <form method="post">

        <label for="email">Gmail</label>
        <input type="email" name="name" id="email" placeholder="Enter your Gmail" required>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password" required>
        <span class="signup">if you are not register <a href="#">signup</a> First</span>
        <button type="submit" class="btn">Login</button>
        </form>
    </div>
    
</body>
</html>
